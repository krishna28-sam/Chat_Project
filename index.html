<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
        }

        .auth-box {
            background: #0f0f0f;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 102, 204, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 28px;
            color: #0066cc;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #999;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #2d2d2d;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            background: #333333;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0066cc;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0088ff;
        }

        .btn-secondary {
            background: #666666;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #777777;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }

        .auth-toggle a {
            color: #0066cc;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: #0066cc;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 102, 204, 0.5);
        }

        .chat-header-left h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .chat-header-left p {
            font-size: 12px;
            color: #ccc;
        }

        .room-selector {
            display: flex;
            gap: 10px;
        }

        .room-selector input {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }

        .room-selector input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        .room-selector input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .room-selector button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .room-selector button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #1a1a1a;
        }

        .message {
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            text-align: right;
        }

        .message.own .bubble {
            background: #4CAF50;
            color: #fff;
        }

        .message.other .bubble {
            background: #333333;
            color: #87CEEB;
        }

        .message.system {
            text-align: center;
        }

        .message.system .bubble {
            background: transparent;
            color: #FFB84D;
            font-size: 12px;
            font-style: italic;
        }

        .message-user {
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
            margin-left: 8px;
        }

        .message.own .message-user {
            margin-left: auto;
            margin-right: 8px;
        }

        .bubble {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 6px;
            word-wrap: break-word;
            max-width: 60%;
        }

        .input-area {
            padding: 15px 20px;
            background: #0f0f0f;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 14px;
            background: #2d2d2d;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-family: inherit;
        }

        .input-area input:focus {
            outline: none;
            background: #333333;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.3);
        }

        .input-area button {
            padding: 10px 20px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .input-area button:hover {
            background: #0088ff;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <div class="auth-header">
                <h1>CHAT APP</h1>
                <p>Real-time Messaging</p>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
                <div class="auth-toggle">
                    Don't have an account? <a onclick="switchToSignup()">Sign Up</a>
                </div>
            </div>

            <div id="signupForm" style="display: none;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">
                </div>
                <button class="btn-primary" onclick="signup()">Sign Up</button>
                <div class="auth-toggle">
                    Already have an account? <a onclick="switchToLogin()">Login</a>
                </div>
            </div>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <h2 id="currentUser">User</h2>
                <p id="currentRoom">Room: general</p>
            </div>
            <div class="room-selector">
                <input type="text" id="switchRoomInput" placeholder="Room name...">
                <button onclick="switchRoom()">Switch</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="messagesContainer" class="messages-container"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const socket = io(API_URL);
        
        let currentUser = null;
        let currentRoom = 'general';

        function switchToSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }

        function switchToLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert('Fill all fields');
                return;
            }

            try {
                const response = await fetch(API_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.status === 200) {
                    const data = await response.json();
                    currentUser = data.user;
                    showChatScreen();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Login failed');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function signup() {
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();

            if (!username || !email || !password) {
                alert('Fill all fields');
                return;
            }

            try {
                const response = await fetch(API_URL + '/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (response.status === 201) {
                    const data = await response.json();
                    currentUser = data.user;
                    showChatScreen();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Signup failed');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        function showChatScreen() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('currentUser').textContent = currentUser.username;
            
            socket.emit('join_room', { room: currentRoom, username: currentUser.username });
            setupSocketListeners();
        }

        function setupSocketListeners() {
            socket.on('receive_message', (data) => {
                addMessage(data.username, data.message, data.username === currentUser.username ? 'own' : 'other');
            });

            socket.on('user_joined', (data) => {
                addMessage('System', data.message, 'system');
            });
        }

        function addMessage(username, message, type) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;

            const userDiv = document.createElement('div');
            userDiv.className = 'message-user';
            userDiv.textContent = username;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = message;

            messageDiv.appendChild(userDiv);
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            socket.emit('send_message', {
                room: currentRoom,
                message: message,
                username: currentUser.username,
                userId: currentUser.id
            });

            input.value = '';
            input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function switchRoom() {
            const newRoom = document.getElementById('switchRoomInput').value.trim();
            if (!newRoom) return;

            currentRoom = newRoom;
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('currentRoom').textContent = 'Room: ' + currentRoom;
            document.getElementById('switchRoomInput').value = '';
            
            socket.emit('join_room', { room: currentRoom, username: currentUser.username });
        }

        function logout() {
            socket.disconnect();
            currentUser = null;
            currentRoom = 'general';
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }
    </script>
</body>
</html>
